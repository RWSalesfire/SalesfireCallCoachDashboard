name: Trigger Daily Pipeline

on:
  schedule:
    # Run 6x daily: 5am, 8am, 11am, 2pm, 5pm, 8pm UTC (Mon-Fri)
    - cron: '0 5,8,11,14,17,20 * * 1-5'
  workflow_dispatch: # Allow manual triggers

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Enrich calls from HubSpot
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.PIPELINE_URL }}/api/cron/enrich-calls?secret=${{ secrets.CRON_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "=== Enrich: HTTP $HTTP_CODE ==="
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "::warning::Enrich returned HTTP $HTTP_CODE — continuing"
          fi

      - name: Transcribe calls with Deepgram
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 300 -X POST \
            "${{ secrets.PIPELINE_URL }}/api/cron/transcribe-calls?secret=${{ secrets.CRON_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "=== Transcribe: HTTP $HTTP_CODE ==="
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "::warning::Transcribe returned HTTP $HTTP_CODE — continuing"
          fi

      - name: Analyze calls with Claude
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 300 -X POST \
            "${{ secrets.PIPELINE_URL }}/api/cron/analyze-calls?secret=${{ secrets.CRON_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "=== Analyze: HTTP $HTTP_CODE ==="
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "::warning::Analyze returned HTTP $HTTP_CODE — continuing"
          fi

      - name: Aggregate daily stats
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 300 -X POST \
            "${{ secrets.PIPELINE_URL }}/api/cron/aggregate-daily?secret=${{ secrets.CRON_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "=== Aggregate: HTTP $HTTP_CODE ==="
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Aggregate returned HTTP $HTTP_CODE"
            exit 1
          fi
